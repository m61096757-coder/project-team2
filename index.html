                <h2>python</h2>
                <p>is a high-level, general-purpose programming language and scripting language that emphasizes code readability, simplicity, and ease-of-writing with the use of significant indentation,[38] "plain English" naming, an extensive ("batteries-included") standard library, and garbage collection. Python supports multiple programming paradigms but with an emphasis on object-oriented programming and dynamic typing.

Guido van Rossum began working on Python in the late 1980s as a successor to the ABC programming language. Python 3.0, released in 2008, was a major revision and not completely backward-compatible with earlier versions. Beginning with Python 3.5,[39] capabilities and keywords for typing were added to the language, allowing optional static typing.[40] As of 2026, the Python Software Foundation supports Python 3.10, 3.11, 3.12, 3.13, and 3.14, following the project's annual release cycle and five-year support policy. Python 3.15 is currently in the alpha development phase, and the stable release is expected to come out in October 2026.[41] Earlier versions in the 3.x series have reached end-of-life and no longer receive security updates.

Python has gained widespread use in the machine learning community.[42][43][44][45] It is widely taught as an introductory programming language.[46] Since 2003, Python has consistently ranked in the top ten of the most popular programming languages in the TIOBE Programming Community Index, which ranks based on searches in 24 platforms.[47]

<h2>c++</h2>
<p>is a high-level, general-purpose programming language created by Danish computer scientist Bjarne Stroustrup.
     First released in 1985 as an extension of the C programming language, adding object-oriented (OOP) features,
      it has since expanded significantly over time adding more OOP and other features; as of 1997/C++98 standardization, 
      C++ has added functional features, in addition to facilities for low-level memory manipulation for systems like microcomputers or 
      to make operating systems like Linux or Windows, 
      and even later came features like generic programming (through the use of templates).
       C++ is usually implemented as a compiled language, and many vendors provide C++ compilers, 
       including the Free Software Foundation, LLVM, Microsoft, Intel, Embarcadero, Oracle, and IBM.[16]
C++ was designed with systems programming and embedded, resource-constrained software and large systems in mind, 
with performance, efficiency, and flexibility of use as its design highlights.
[17] C++ has also been found useful in many other contexts, with key strengths being software infrastructure and resource-constrained applications,
[17] including desktop applications, video games, servers (e.g., e-commerce, web search,
 or databases), and performance-critical applications (e.g., telephone switches or space probes).[18]
C++ is standardized by the International Organization for Standardization (ISO), with the latest standard version ratified and published by ISO in October 2024 as ISO/IEC 14882:2024 (informally known as C++23).[19] The C++ programming language was initially standardized in 1998 as ISO/IEC 14882:1998, which was then amended by the C++03, C++11, C++14, C++17, and C++20 standards. The current C++23 standard supersedes these with new features and an enlarged standard library. Before the initial standardization in 1998, C++ was developed by Stroustrup at Bell Labs since 1979 as an extension of the C language; he wanted an efficient and flexible language similar to C that also provided high-level features for program organization.[20] Since 2012, C++ has been on a three-year release schedule[21] with C++26 as the next planned standard.[22]
</p>

<h2>java</h2>
<p>is one of the Greater Sunda Islands in the South East Asian country of Indonesia.
     It is bordered by the Indian Ocean to the south and the Java Sea (a part of Pacific Ocean) to the north.
      With a population of 156.9 million people (including Madura) in mid 2024, projected to have risen to 158 million by mid-2025, 
      Java is the world's most populous island, home to approximately 56% of the Indonesian population while constituting only 7% of its land area.
      [2] Indonesia's capital city, Jakarta, is on Java's northwestern coast.

Many of the best known events in Indonesian history took place on Java. 
It was the centre of powerful Hindu-Buddhist empires, the Islamic sultanates, 
and the core of the colonial Dutch East Indies. Java was also the center of the Indonesian struggle for independence during the 1930s and 1940s. 
Java dominates Indonesia politically, economically, and culturally. 
Four of Indonesia's eight UNESCO world heritage sites are located in Java: 
Ujung Kulon National Park, Borobudur Temple, Prambanan Temple, and Sangiran Early Man Site.

Java was formed by volcanic eruptions due to geologic subduction of the Australian Plate under the Sunda Plate.
 It is the 13th largest island in the world and the fifth largest in Indonesia by landmass, 
 at about 132,598.77 square kilometres (51,196.67 mi2) (including Madura's 5,408.45 square kilometres (2,088.21 mi2)). 
 A chain of volcanic mountains is the east–west spine of the island.

Four main languages are spoken on the island: Javanese, Sundanese, Madurese, and Betawi. 
Javanese and Sundanese are the most spoken.[3] The ethnic groups native to the island are the Javanese in the central and eastern parts and Sundanese in the western parts. 
The Madurese in the Eastern salient of Java are migrants from Madura Island (which is part of East Java Province in administrative terms),
 while the Betawi in the capital city of Jakarta are hybrids from various ethnic groups in Indonesia.
  Most residents are bilingual, speaking Indonesian (the official language of Indonesia) as their first or second language. 
  While the majority of the people of Java are Muslim, Java's population comprises people of diverse religious beliefs, 
  ethnicities, and cultures.[4]
Java is divided into four administrative provinces: Banten, West Java, Central Java, and East Java, 
and two special regions, Jakarta and Yogyakarta.

<h2>c#</h2>
<p>C# (/ˌsiː ˈʃɑːrp/ see SHARP)[b] is a general-purpose high-level programming language supporting multiple paradigms.
     C# encompasses static typing,[16]: 4  strong typing, lexically scoped, imperative, declarative, functional, generic,
     [16]: 22  object-oriented (class-based), and component-oriented programming disciplines.
     [17]The principal designers of the C# programming language were Anders Hejlsberg, 
Scott Wiltamuth, and Peter Golde from Microsoft.[17] It was first widely distributed in July 2000[17] and
 was later approved as an international standard by Ecma (ECMA-334) in 2002 and ISO/IEC (ISO/IEC 23270 and 20619[c]) in 2003.
 Microsoft introduced C# along with .NET Framework and Microsoft Visual Studio, 
 both of which are, technically speaking, closed-source. At the time,
  Microsoft had no open-source products. Four years later, in 2004, 
 a free and open-source project called Mono began, providing a cross-platform compiler and runtime environment for the C# programming language.
  A decade later, Microsoft released Visual Studio Code (code editor), Roslyn (compiler), and the unified .NET platform (software framework), 
  all of which support C# and are free, open-source, and cross-platform. 
  Mono also joined Microsoft, but was not merged into .NET.</p>

<h2>pHp</h2>
<p>PHP is a general-purpose scripting language geared towards web development.
    [8] It was created by Danish-Canadian programmer Rasmus Lerdorf in 1993 and released in 1995.
    [9][10] The PHP reference implementation is now produced by the PHP Group.
    [11] PHP was originally an abbreviation of Personal Home Page,
    [12][13] but it now stands for the recursive backronym PHP: Hypertext Preprocessor.[14]

PHP code is usually processed on a web server by a PHP interpreter implemented as a module,
 a daemon or a Common Gateway Interface (CGI) executable. On a web server, 
 the result of the interpreted and executed PHP code—which may be any type of data,
  such as generated HTML or binary image data—can form the whole or part of an HTTP response. 
  Various web template systems, web content management systems, 
  and web frameworks exist that can be employed to orchestrate or facilitate the generation of that response.
   Additionally, PHP can be used for programming tasks outside the web context,
    though non-web uses are rare. PHP code can also be directly executed from the command line.
The standard PHP interpreter, powered by the Zend Engine, is free software released under the PHP License.
 PHP has been widely ported and can be deployed on most web servers on a variety of operating systems and platforms.[15]
